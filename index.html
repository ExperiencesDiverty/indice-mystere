<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Indice mystère</title>

  <style>
    :root {
      --vert: #9bc55e;
      --vert-fonce: #355952;
      --jaune: #f8c47c;
      --rose: #efafaa;
      --bleu: #93d5e4;
      --blanc: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;

      font-family: Futura, "Trebuchet MS", Arial, sans-serif;

      color: var(--blanc);

      background:
        linear-gradient(rgba(0,0,0,0.58), rgba(0,0,0,0.72)),
        url("fond-diverty.png") center / cover no-repeat fixed;

      display: flex;
      align-items: center;
      justify-content: center;

      padding: 32px 18px;
    }

    .card {
      width: 100%;
      max-width: 760px;

      padding: 46px 38px;

      border-radius: 34px;

      background: rgba(53, 89, 82, 0.82);

      border: 2px solid var(--vert);

      box-shadow: 0 24px 80px rgba(0,0,0,0.45);

      backdrop-filter: blur(10px);

      text-align: center;
    }

    .logo {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 3px;
      margin-bottom: 26px;
    }

    .logo span {
      color: var(--vert);
    }

    h1 {
      font-size: clamp(34px, 6vw, 58px);
      margin: 0;
      line-height: 1.05;
    }

    .underline {
      width: 110px;
      height: 8px;
      background: var(--jaune);
      border-radius: 99px;
      margin: 24px auto 30px;
    }

    .intro {
      font-size: clamp(20px, 3vw, 28px);
      line-height: 1.45;
      margin-bottom: 34px;
    }

    .loading {
      margin: 32px auto;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 7px solid rgba(255,255,255,0.18);
      border-top: 7px solid var(--vert);
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .code-box {
      display: none;

      margin: 18px auto 34px;

      padding: 24px 38px;

      border-radius: 24px;

      background: var(--blanc);

      color: var(--vert-fonce);

      font-size: clamp(42px, 9vw, 74px);

      font-weight: 900;

      letter-spacing: 4px;

      box-shadow: 0 18px 45px rgba(0,0,0,0.35);

      animation: pop 0.35s ease;
    }

    @keyframes pop {
      from {
        transform: scale(0.85);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .info {
      display: none;

      margin: 18px auto 34px;

      padding: 24px 28px;

      border: 1.5px solid var(--vert);

      border-radius: 22px;

      max-width: 560px;

      background: rgba(255,255,255,0.06);

      font-size: 20px;
      line-height: 1.4;

      animation: fade 0.4s ease;
    }

    @keyframes fade {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .info strong {
      color: var(--vert);
      font-size: 24px;
    }

    .small {
      margin-top: 26px;
      font-size: 15px;
      opacity: 0.9;
    }

    @media (max-width: 600px) {

      .card {
        padding: 34px 22px;
      }

      .code-box {
        letter-spacing: 2px;
        padding: 22px 24px;
      }

    }
  </style>
</head>

<body>

  <main class="card">

    <div class="logo">
      DIVERTY <span>EVENTS</span>
    </div>

    <h1>Décryptage en cours...</h1>

    <div class="underline"></div>

    <div class="intro">
      Votre indice mystère est en train d’être généré.
    </div>

    <div class="loading" id="loader"></div>

    <div class="code-box" id="codeBox"></div>

    <div class="info" id="infoBox">

      <strong>Gardez cet indice précieusement.</strong>

      <br />

      Il pourrait vous donner un avantage pendant l’activité.

      <br />

      N’hésitez pas à échanger avec les autres participants.

    </div>

    <div class="small">
      Merci pour votre participation.
    </div>

  </main>

  <script>

    /* =========================
       LISTE DES INDICES
    ========================= */

    const codes = [
      "CADENAS",
      "CADEAU",
      "MASQUE"
    ];

    /* =========================
       TIRAGE ALEATOIRE
    ========================= */

    const randomCode =
      codes[Math.floor(Math.random() * codes.length)];

    /* =========================
       AFFICHAGE APRES DELAI
    ========================= */

    setTimeout(() => {

      document.querySelector("h1").textContent =
        "Indice mystère débloqué";

      document.querySelector(".intro").textContent =
        "Bravo, votre réponse a bien été prise en compte.";

      document.getElementById("loader").style.display =
        "none";

      const codeBox =
        document.getElementById("codeBox");

      codeBox.style.display =
        "inline-block";

      codeBox.textContent =
        randomCode;

      document.getElementById("infoBox").style.display =
        "block";

    }, 2200);

  </script>

</body>
</html>
